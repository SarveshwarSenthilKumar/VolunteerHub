<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}VolunteerHub{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-secondary: #60a5fa;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --vh-nav-bg: rgba(17,24,39,0.97);
            --vh-nav-shadow: 0 4px 24px 0 rgba(59,130,246,0.10);
            --vh-nav-radius: 1.2rem;
            --vh-nav-accent: #3b82f6;
            --vh-nav-accent2: #60a5fa;
            --vh-nav-icon: #fff;
            --vh-nav-tooltip-bg: #23272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .navbar {
            background-color: var(--bg-secondary);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            position: relative;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            flex-shrink: 0;
            margin-right: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            flex: 1 1 auto;
            justify-content: flex-end;
            min-width: 0;
        }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .button-primary {
            background-color: var(--accent-primary);
            color: white;
        }

        .button-primary:hover {
            background-color: var(--accent-secondary);
            transform: translateY(-1px);
        }

        .button-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .button-secondary:hover {
            background-color: #2d3a4f;
            transform: translateY(-1px);
        }

        .card {
            background-color: var(--bg-secondary);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--text-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .error {
            background-color: var(--error);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .success {
            background-color: var(--success);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--bg-secondary);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Simplistic hamburger menu styles */
        .simple-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: none;
            border: none;
            border-radius: 0;
            box-shadow: none;
            cursor: pointer;
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20000;
            outline: none;
            transition: background 0.18s, box-shadow 0.18s, border 0.18s;
        }
        .simple-menu-btn:hover, .simple-menu-btn:focus, .simple-menu-btn:active {
            background: none;
            border: none;
            box-shadow: none;
        }
        .simple-menu-icon {
            width: 28px;
            height: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .simple-menu-icon span {
            display: block;
            width: 100%;
            height: 3.5px;
            border-radius: 2px;
            background: #3b82f6;
            transition: background 0.2s;
        }
        .simple-menu-btn:hover .simple-menu-icon span,
        .simple-menu-btn:focus .simple-menu-icon span,
        .simple-menu-btn:active .simple-menu-icon span {
            background: #fff;
        }
        .simple-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            min-width: 180px;
            background: #fff;
            border-radius: 0.7rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 0.7rem 0.3rem;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: opacity 0.18s, transform 0.18s;
        }
        .simple-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .simple-dropdown .nav-link {
            color: #23272a;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.1rem;
            background: none;
            transition: background 0.18s, color 0.18s;
            display: block;
        }
        .simple-dropdown .nav-link:hover {
            background: #f1f5f9;
            color: #3b82f6;
        }
        @media (max-width: 600px) {
            .container {
                padding: 0.5rem;
            }
            .navbar {
                padding: 0.5rem 0.7rem;
            }
            .navbar-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.7rem;
            }
            .nav-links {
                gap: 0.7rem;
                flex-wrap: wrap;
                font-size: 1em;
            }
            .card {
                padding: 1rem;
                border-radius: 0.7rem;
            }
            h1 {
                font-size: 2rem;
                margin-bottom: 1.2rem;
            }
            h2 {
                font-size: 1.2rem;
                margin-bottom: 0.7rem;
            }
            p {
                font-size: 1em;
            }
        }
        @media (max-width: 400px) {
            .container {
                padding: 0.2rem;
            }
            .navbar {
                padding: 0.2rem 0.3rem;
            }
            h1 {
                font-size: 1.3rem;
            }
            h2 {
                font-size: 1rem;
            }
        }
        @media (max-width: 900px) {
            .simple-menu-btn { display: flex; }
            .nav-links { display: none !important; }
        }
        @media (min-width: 901px) {
            .simple-menu-btn, .simple-dropdown { display: none !important; }
        }
        .nav-toggle, .mobile-nav-dropdown, .futuristic-menu-btn, .futuristic-dropdown, .modern-menu-btn, .modern-dropdown { display: none !important; }
        .vh-nav {
            background: var(--vh-nav-bg);
            box-shadow: var(--vh-nav-shadow);
            position: sticky;
            top: 0;
            z-index: 2000;
            padding: 1rem 2rem;
        }
        .vh-nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        /* Logo untouched */
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            flex-shrink: 0;
            margin-right: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        /* Hamburger Button */
        #vh-hamburger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--vh-nav-accent) 0%, var(--vh-nav-accent2) 100%);
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 24px 0 rgba(59,130,246,0.18);
            cursor: pointer;
            position: relative;
            transition: box-shadow 0.2s, background 0.2s, transform 0.18s;
            outline: none;
        }
        #vh-hamburger:active, #vh-hamburger:focus {
            box-shadow: 0 2px 8px 0 rgba(59,130,246,0.25);
            background: linear-gradient(135deg, #2563eb 0%, var(--vh-nav-accent2) 100%);
        }
        #vh-hamburger .vh-hamburger-icon {
            width: 28px;
            height: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        #vh-hamburger .vh-hamburger-icon span {
            display: block;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--vh-nav-icon);
            transition: all 0.3s cubic-bezier(.68,-0.55,.27,1.55);
        }
        #vh-hamburger.open .vh-hamburger-icon span:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }
        #vh-hamburger.open .vh-hamburger-icon span:nth-child(2) {
            opacity: 0;
        }
        #vh-hamburger.open .vh-hamburger-icon span:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
        }
        /* Dropdown */
        #vh-dropdown {
            position: absolute;
            top: 110%;
            right: 0;
            min-width: 60px;
            background: var(--vh-nav-bg);
            border-radius: var(--vh-nav-radius);
            box-shadow: 0 8px 32px 0 rgba(59,130,246,0.18);
            padding: 1.1rem 0.5rem;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-16px) scale(0.98);
            transition: opacity 0.28s cubic-bezier(.68,-0.55,.27,1.55), transform 0.28s cubic-bezier(.68,-0.55,.27,1.55);
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        #vh-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        #vh-dropdown a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            margin: 0 auto;
            border-radius: 50%;
            background: none;
            color: var(--vh-nav-icon);
            font-size: 1.35em;
            transition: background 0.18s, color 0.18s, transform 0.18s;
            text-decoration: none;
            box-shadow: 0 2px 8px 0 rgba(59,130,246,0.08);
            position: relative;
        }
        #vh-dropdown a:hover, #vh-dropdown a:focus {
            background: linear-gradient(135deg, var(--vh-nav-accent) 0%, var(--vh-nav-accent2) 100%);
            color: #fff;
            transform: scale(1.08) translateY(-2px);
        }
        #vh-dropdown a .vh-nav-tooltip {
            visibility: hidden;
            opacity: 0;
            background: var(--vh-nav-tooltip-bg);
            color: #fff;
            text-align: center;
            border-radius: 0.5em;
            padding: 0.3em 0.8em;
            position: absolute;
            left: 110%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10000;
            font-size: 0.95em;
            font-weight: 600;
            white-space: nowrap;
            transition: opacity 0.18s, visibility 0.18s;
            pointer-events: none;
        }
        #vh-dropdown a:hover .vh-nav-tooltip, #vh-dropdown a:focus .vh-nav-tooltip {
            visibility: visible;
            opacity: 1;
        }
        @media (max-width: 600px) {
            .container { padding: 0.5rem; }
            .vh-nav { padding: 0.5rem 0.7rem; }
            .vh-nav-content { flex-direction: row; gap: 0.7rem; }
            .logo { font-size: 1.2rem; }
        }
        @media (max-width: 400px) {
            .container { padding: 0.2rem; }
            .vh-nav { padding: 0.2rem 0.3rem; }
            .logo { font-size: 1rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="vh-nav">
        <div class="vh-nav-content" style="z-index: 10; position: relative;">
            <a href="/" class="logo">VolunteerHub</a>
            <button id="vh-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="vh-dropdown">
                <span class="vh-hamburger-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </button>
            <div id="vh-dropdown">
                {% if session.get("name") %}
                    <a href="/swipe" tabindex="0"><i class="fas fa-fire"></i><span class="vh-nav-tooltip">Find</span></a>
                    <a href="/all-opportunities" tabindex="0"><i class="fas fa-list"></i><span class="vh-nav-tooltip">All</span></a>
                    <a href="/map" tabindex="0"><i class="fas fa-map-marked-alt"></i><span class="vh-nav-tooltip">Map</span></a>
                    <a href="/saved" tabindex="0"><i class="fas fa-bookmark"></i><span class="vh-nav-tooltip">Saved</span></a>
                    <a href="/profile" tabindex="0"><i class="fas fa-user"></i><span class="vh-nav-tooltip">Profile</span></a>
                    <a href="/ai-email" tabindex="0"><i class="fas fa-robot"></i><span class="vh-nav-tooltip">AI Email</span></a>
                    <a href="/resume-match" tabindex="0"><i class="fas fa-file-alt"></i><span class="vh-nav-tooltip">Resume</span></a>
                    <a href="/auth/logout" tabindex="0"><i class="fas fa-sign-out-alt"></i><span class="vh-nav-tooltip">Logout</span></a>
                {% else %}
                    <a href="/auth/login" tabindex="0"><i class="fas fa-sign-in-alt"></i><span class="vh-nav-tooltip">Login</span></a>
                    <a href="/auth/signup" tabindex="0"><i class="fas fa-user-plus"></i><span class="vh-nav-tooltip">Sign Up</span></a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('vh-hamburger');
        const dropdown = document.getElementById('vh-dropdown');
        if (menuBtn && dropdown) {
            function toggleMenu(e) {
                e.preventDefault();
                e.stopPropagation();
                const isOpen = dropdown.classList.toggle('open');
                menuBtn.classList.toggle('open', isOpen);
                menuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            }
            menuBtn.addEventListener('click', toggleMenu);
            menuBtn.addEventListener('touchstart', toggleMenu);
            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) {
                    dropdown.classList.remove('open');
                    menuBtn.classList.remove('open');
                    menuBtn.setAttribute('aria-expanded', 'false');
                }
            });
            dropdown.querySelectorAll('a').forEach(function(link) {
                link.addEventListener('click', function() {
                    dropdown.classList.remove('open');
                    menuBtn.classList.remove('open');
                    menuBtn.setAttribute('aria-expanded', 'false');
                });
            });
        }
    });
    </script>
    {% endblock %}
</body>
</html>
