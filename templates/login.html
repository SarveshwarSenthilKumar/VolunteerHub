{% extends "base.html" %}

{% block title %}Login - VolunteerHub{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <h1>Welcome Back</h1>
    <p style="margin-bottom: 2rem;">Sign in to continue your volunteering journey</p>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="/auth/login" class="card">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="button button-primary" style="width: 100%;">Sign In</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        Don't have an account? <a href="/auth/signup" style="color: var(--accent-primary); text-decoration: none;">Sign up</a>
    </p>
</div>
{% endblock %}
