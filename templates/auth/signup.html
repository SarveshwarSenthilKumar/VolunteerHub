{% extends "base.html" %}

{% block title %}Sign Up - VolunteerHub{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <h1>Join VolunteerHub</h1>
    <p style="margin-bottom: 2rem;">Create an account to start making a difference</p>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="/auth/signup" class="card">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <label for="location">Location (City, State)</label>
            <input type="text" id="location" name="location" required>
        </div>
        
        <button type="submit" class="button button-primary" style="width: 100%;">Create Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        Already have an account? <a href="/auth/login" style="color: var(--accent-primary); text-decoration: none;">Sign in</a>
    </p>
</div>
{% endblock %}
