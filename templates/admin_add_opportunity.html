{% extends "base.html" %}
{% block title %}Add Opportunity - Admin{% endblock %}
{% block content %}
<div class="dashboard-container" style="max-width:700px;margin:3rem auto 0 auto;background:rgba(20,30,50,0.97);border-radius:2rem;box-shadow:0 8px 40px 0 rgba(59,130,246,0.18);padding:2.5rem 2rem;">
    <div class="dashboard-title" style="font-size:2rem;margin-bottom:1.5rem;">Add Opportunity</div>
    {% if message %}
    <div class="message" style="margin-bottom:1.5rem;">{{ message }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group"><label>Organization Name*</label><input type="text" name="organization_name" required></div>
        <div class="form-group"><label>Title*</label><input type="text" name="title" required></div>
        <div class="form-group"><label>Description*</label><textarea name="description" rows="3" required></textarea></div>
        <div class="form-group"><label>Location*</label><input type="text" name="location" required></div>
        <div class="form-group"><label>City*</label><input type="text" name="city" required></div>
        <div class="form-group"><label>State*</label><input type="text" name="state" required></div>
        <div class="form-group"><label>Duration</label><input type="text" name="duration"></div>
        <div class="form-group"><label>Volunteers Needed</label><input type="number" name="volunteers_needed" min="1"></div>
        <div class="form-group"><label>Contact Info*</label><input type="text" name="contact_info" required></div>
        <div class="form-group"><label>Apply Link*</label><input type="url" name="apply_link" required></div>
        <div class="form-group"><label>Latitude</label><input type="text" name="latitude"></div>
        <div class="form-group"><label>Longitude</label><input type="text" name="longitude"></div>
        <button type="submit" class="button" style="width:100%;margin-top:1.2rem;background:linear-gradient(90deg,#3b82f6 0%,#06b6d4 100%);color:#fff;font-weight:700;font-size:1.1em;padding:0.9em 2em;border-radius:1em;">Add Opportunity</button>
    </form>
</div>
<style>
.form-group { margin-bottom: 1.1rem; }
label { display: block; margin-bottom: 0.4rem; color: #bfc9d1; font-weight: 600; }
input, textarea { width: 100%; padding: 0.7em; border-radius: 0.7em; border: 1px solid #23272a; background: #181f2e; color: #fff; font-size: 1em; }
input:focus, textarea:focus { border-color: #3b82f6; outline: none; }
.message { background: #23272a; color: #fff; border-radius: 0.7rem; padding: 1rem 1.5rem; text-align: center; font-size: 1.1rem; box-shadow: 0 2px 8px rgba(59,130,246,0.07); margin-bottom: 1.2rem; }
</style>
{% endblock %}
